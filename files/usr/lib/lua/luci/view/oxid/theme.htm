  font-weight:100;font-display:swap;
}
.oxid-app{
  /* warm-neutral ground — "oxide", the brand */
  --bg:oklch(0.168 0.006 55);--surface:oklch(0.206 0.007 55);--surface-2:oklch(0.242 0.009 55);
  --elev:oklch(0.275 0.010 55);
  --line:oklch(1 0 0 / 0.075);--line-2:oklch(1 0 0 / 0.13);
  --ink:oklch(0.965 0.004 75);--muted:oklch(0.755 0.011 65);--faint:oklch(0.605 0.010 65);
  /* ember accent (identity) + semantic status (kept separate from accent) */
  --accent:oklch(0.705 0.165 48);--accent-ink:oklch(0.19 0.05 48);--accent-soft:oklch(0.705 0.165 48 / 0.13);
  --accent-hi:oklch(0.745 0.175 48);
  --up:oklch(0.77 0.14 155);--warn:oklch(0.80 0.13 78);--bad:oklch(0.655 0.19 25);--info:oklch(0.72 0.13 235);
  /* latency ramp */
  --l-fast:oklch(0.78 0.15 155);--l-good:oklch(0.81 0.14 128);--l-ok:oklch(0.83 0.14 92);
  --l-slow:oklch(0.79 0.15 60);--l-bad:oklch(0.66 0.19 25);
  /* spacing scale, radii, motion */
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;
  --r:12px;--r-sm:8px;--r-lg:16px;--r-full:999px;
  --ease:cubic-bezier(.2,.8,.2,1);--dur:.16s;
  --shadow:0 1px 2px oklch(0 0 0 / .3),0 8px 24px -12px oklch(0 0 0 / .5);

  color-scheme:dark;
  background:
    radial-gradient(120% 90% at 96% -12%, oklch(0.705 0.165 48 / 0.08), transparent 52%),
    radial-gradient(90% 70% at -12% 0%, oklch(0.55 0.09 250 / 0.06), transparent 48%),
    var(--bg);
  color:var(--ink);
  font:14.5px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  letter-spacing:-0.006em;-webkit-font-smoothing:antialiased;
  border-radius:var(--r);padding:clamp(16px,2.2vw,24px);margin:-4px 0 0;
}
.oxid-app *{box-sizing:border-box}
.oxid-app ::selection{background:var(--accent-soft)}
.oxid-app :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ---- icons ---- */
.oxid-app .ic{width:1.05em;height:1.05em;flex:0 0 auto;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-0.14em}
.oxid-app .ic-lg{width:1.35em;height:1.35em}

/* ---- header / brand ---- */
.oxid-app .top{display:flex;align-items:center;gap:var(--s4);margin-bottom:var(--s5);flex-wrap:wrap}
.oxid-app .brand{display:flex;align-items:baseline;gap:10px;line-height:1}
.oxid-app .wordmark{font-family:'OXID Wordmark',system-ui;font-weight:100;font-size:32px;
  letter-spacing:0.15em;padding-left:0.15em;color:var(--ink)}
.oxid-app .tagline{color:var(--faint);font-size:12px;white-space:nowrap;letter-spacing:0}
/* bare form controls inherit the field look, so views need not restyle them */
.oxid-app input:not([type=checkbox]):not([type=radio]):not([type=range]),
.oxid-app select,.oxid-app textarea{width:100%;font:inherit;font-size:13.5px;color:var(--ink);
  background:var(--bg);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 11px;transition:border-color var(--dur) var(--ease)}
.oxid-app input:focus,.oxid-app select:focus,.oxid-app textarea:focus{outline:none;border-color:var(--accent)}
.oxid-app textarea{resize:vertical;min-height:80px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
.oxid-app .spacer{flex:1}

/* ---- status pill ---- */
.oxid-app .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--r-full);
  background:var(--surface);border:1px solid var(--line);font-size:12.5px;font-weight:500}
.oxid-app .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.oxid-app .pill.on .dot{background:var(--up);box-shadow:0 0 0 0 oklch(0.77 0.14 155 / .5);animation:oxpulse 2.6s var(--ease) infinite}
.oxid-app .pill.off .dot{background:var(--bad)}
@keyframes oxpulse{70%{box-shadow:0 0 0 6px oklch(0.77 0.14 155 / 0)}100%{box-shadow:0 0 0 0 oklch(0.77 0.14 155 / 0)}}

/* ---- cards ---- */
.oxid-app .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:var(--s5)}
.oxid-app .card + .card{margin-top:var(--s3)}
.oxid-app .card-h{display:flex;align-items:center;gap:10px;margin:0 0 var(--s4);flex-wrap:wrap}
.oxid-app .card-h h2{font-size:11.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--faint);margin:0;display:flex;align-items:center;gap:8px}
.oxid-app .card-h .count{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}

/* ---- buttons ---- */
.oxid-app .btn{appearance:none;cursor:pointer;font:inherit;font-size:13px;font-weight:600;
  padding:9px 14px;border-radius:var(--r-sm);background:var(--surface-2);color:var(--ink);
  border:1px solid var(--line-2);transition:background var(--dur) var(--ease),border-color var(--dur) var(--ease),transform var(--dur) var(--ease);
  display:inline-flex;align-items:center;gap:7px;text-decoration:none;white-space:nowrap}
.oxid-app .btn:hover{border-color:var(--faint);background:var(--elev)}
.oxid-app .btn:active{transform:translateY(1px)}
.oxid-app .btn[disabled]{opacity:.5;cursor:default;pointer-events:none}
.oxid-app .btn.sm{padding:6px 11px;font-size:12.5px}
.oxid-app .btn.ghost{background:transparent;border-color:var(--line)}
.oxid-app .btn.ghost:hover{background:var(--surface-2);border-color:var(--line-2)}
.oxid-app .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
.oxid-app .btn.primary:hover{background:var(--accent-hi)}
.oxid-app .btn.danger{color:var(--bad);border-color:oklch(0.655 0.19 25 / 0.4)}
.oxid-app .btn.danger:hover{background:oklch(0.655 0.19 25 / 0.12);border-color:var(--bad)}
.oxid-app .btn .sub{color:var(--faint);font-weight:500}
.oxid-app .btn.primary .sub{color:var(--accent-ink);opacity:.7}
/* split button (main + adjacent action) */
.oxid-app .split{display:inline-flex}
.oxid-app .split .btn:first-child{border-top-right-radius:0;border-bottom-right-radius:0}
.oxid-app .split .btn:last-child{border-top-left-radius:0;border-bottom-left-radius:0;border-left:1px solid oklch(0 0 0 / .18);padding-left:10px;padding-right:10px}

/* ---- segmented control ---- */
.oxid-app .seg{display:flex;flex-wrap:wrap;gap:6px}
.oxid-app .seg button{appearance:none;cursor:pointer;font:inherit;font-size:12.5px;font-weight:600;
  padding:7px 13px;border-radius:var(--r-full);background:var(--surface-2);color:var(--muted);
  border:1px solid var(--line);transition:all var(--dur) var(--ease);display:inline-flex;align-items:center;gap:6px}
.oxid-app .seg button:hover{color:var(--ink);border-color:var(--line-2)}
.oxid-app .seg button[aria-pressed=true]{background:var(--accent);color:var(--accent-ink);border-color:transparent}

/* ---- chips / badges ---- */
.oxid-app .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:var(--r-full);
  font-size:12px;font-weight:600;background:var(--accent-soft);color:var(--accent);
  border:1px solid oklch(0.705 0.165 48 / 0.26)}
.oxid-app .chip.kind{background:var(--surface-2);color:var(--muted);border-color:var(--line)}
.oxid-app .chip .kd{width:7px;height:7px;border-radius:50%}

/* ---- form fields ---- */
.oxid-app .field{display:flex;flex-direction:column;gap:6px;margin-bottom:var(--s4)}
.oxid-app .field > label{font-size:12px;font-weight:600;color:var(--muted)}
.oxid-app .field .hint{font-size:11.5px;color:var(--faint);line-height:1.45}
.oxid-app .input,.oxid-app select.input,.oxid-app textarea.input{width:100%;font:inherit;font-size:13.5px;
  color:var(--ink);background:var(--bg);border:1px solid var(--line-2);border-radius:var(--r-sm);
  padding:9px 11px;transition:border-color var(--dur) var(--ease)}
.oxid-app .input:focus{outline:none;border-color:var(--accent)}
.oxid-app .input::placeholder{color:var(--faint)}
.oxid-app textarea.input{resize:vertical;min-height:76px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
.oxid-app .row{display:flex;gap:var(--s3);flex-wrap:wrap}
.oxid-app .row > .field{flex:1;min-width:150px}

/* ---- toggle ---- */
.oxid-app .toggle{position:relative;display:inline-flex;align-items:center;width:38px;height:22px;flex:0 0 auto;cursor:pointer}
.oxid-app .toggle input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
.oxid-app .toggle .tr{width:100%;height:100%;border-radius:var(--r-full);background:var(--surface-2);border:1px solid var(--line-2);transition:all var(--dur) var(--ease)}
.oxid-app .toggle .tr::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--faint);transition:all var(--dur) var(--ease)}
.oxid-app .toggle input:checked + .tr{background:var(--accent);border-color:transparent}
.oxid-app .toggle input:checked + .tr::after{left:19px;background:var(--accent-ink)}

/* ---- table ---- */
.oxid-app .table{width:100%;border-collapse:collapse;font-size:13px}
.oxid-app .table th{text-align:left;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--faint);padding:0 var(--s3) var(--s2);border-bottom:1px solid var(--line)}
.oxid-app .table td{padding:10px var(--s3);border-bottom:1px solid var(--line);vertical-align:middle}
.oxid-app .table tr:last-child td{border-bottom:0}
.oxid-app .table .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted)}

/* ---- latency values (works on pills and bare .val) ---- */
.oxid-app .val{font-variant-numeric:tabular-nums;font-weight:700}
.oxid-app .l-fast{color:var(--l-fast)}.oxid-app .l-good{color:var(--l-good)}.oxid-app .l-ok{color:var(--l-ok)}
.oxid-app .l-slow{color:var(--l-slow)}.oxid-app .l-bad{color:var(--l-bad)}

/* ---- misc ---- */
.oxid-app .empty{color:var(--faint);font-size:13px;padding:var(--s3) 0;display:flex;align-items:center;gap:8px}
.oxid-app .msg{min-height:18px;font-size:12.5px;color:var(--muted);margin:var(--s3) 2px 0}
.oxid-app .msg.err{color:var(--bad)}
.oxid-app .msg.ok{color:var(--up)}
.oxid-app .foot{display:flex;gap:18px;flex-wrap:wrap;color:var(--faint);font-size:12px;margin-top:var(--s4);padding:0 2px;align-items:center}
.oxid-app .foot code{font-family:ui-monospace,Menlo,monospace;color:var(--muted);font-size:11.5px}
.oxid-app .foot a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line-2)}
.oxid-app .foot a:hover{color:var(--accent)}
.oxid-app .kd-sub{background:var(--info)}.oxid-app .kd-node{background:var(--up)}
.oxid-app .kd-grp{background:oklch(0.72 0.16 300)}.oxid-app .kd-chain{background:var(--warn)}
.oxid-app .kd-tunnel{background:var(--accent)}
@media(prefers-reduced-motion:reduce){.oxid-app *{animation:none!important;transition:none!important}}
</style>
